<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODESTORM // ENTERPRISE CLOUD</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .editor-font { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .log-entry { font-family: 'Fira Code', monospace; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 4px 8px; }
        .log-info { color: #3b82f6; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Viewer Layer -->
    <div id="viewer" class="hidden fixed inset-0 z-50 bg-white">
        <div class="absolute top-4 right-4 z-50">
            <button onclick="location.reload()" class="bg-black text-white px-6 py-2 rounded-full font-bold shadow-2xl">VISSZA A SZERKESZTŐBE</button>
        </div>
        <iframe id="viewer-frame" class="w-full h-full border-none"></iframe>
    </div>

    <!-- Top Navigation -->
    <nav class="h-14 border-b border-white/10 bg-zinc-950 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-md flex items-center justify-center"><i class="fas fa-layer-group"></i></div>
            <span class="font-bold tracking-widest text-sm uppercase">Codestorm <span class="text-blue-500">v3</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-black border border-white/10 rounded-lg px-3 py-1">
                <i class="fas fa-globe text-[10px] text-gray-500 mr-2"></i>
                <input id="siteSlug" type="text" placeholder="projekt-neve" class="bg-transparent border-none outline-none text-xs w-40">
            </div>
            <button onclick="deployProject()" id="deployBtn" class="bg-white text-black hover:bg-blue-500 hover:text-white px-5 py-1.5 rounded-lg text-xs font-black transition-all flex items-center gap-2">
                <i class="fas fa-rocket text-[10px]"></i> DEPLOY
            </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-60 border-r border-white/10 bg-zinc-950 flex flex-col">
            <div class="p-3 text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] flex justify-between items-center">
                Fájlkezelő
                <button onclick="addNewFile()" class="hover:text-white transition"><i class="fas fa-plus"></i></button>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 space-y-1 custom-scroll"></div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col bg-black">
            <!-- Tabs Bar -->
            <div class="h-9 bg-zinc-900/50 border-b border-white/5 flex items-center px-4 gap-2">
                <div class="flex items-center gap-2 text-[11px] text-blue-400 font-mono bg-white/5 px-4 h-full border-b-2 border-blue-500">
                    <i class="fas fa-code"></i> <span id="currentFileNameDisplay">index.html</span>
                </div>
            </div>
            
            <!-- Code Editor -->
            <textarea id="editorField" class="flex-1 bg-transparent p-6 editor-font text-sm outline-none resize-none text-zinc-400 leading-relaxed" spellcheck="false"></textarea>

            <!-- Console Log Panel -->
            <div class="h-40 border-t border-white/10 bg-zinc-950 flex flex-col">
                <div class="p-2 border-b border-white/5 flex justify-between items-center px-4">
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest"><i class="fas fa-terminal mr-2"></i> Rendszernapló</span>
                    <button onclick="document.getElementById('logContainer').innerHTML=''" class="text-[9px] text-gray-600 hover:text-white uppercase">Törlés</button>
                </div>
                <div id="logContainer" class="flex-1 overflow-y-auto custom-scroll p-1">
                    <div class="log-entry log-info">Rendszer inicializálva...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'sb_publishable_pHkgFSiOVt4pI96Dzyi01w_F9TvRsUu';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let files = { 
            'index.html': '<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Codestorm Host v3</h1>\n  <p>Minden fájl integrálva!</p>\n</body>\n</html>',
            'style.css': 'body { background: #111; color: #3b82f6; font-family: sans-serif; text-align: center; padding-top: 50px; }\nh1 { border: 2px solid #3b82f6; display: inline-block; padding: 20px; border-radius: 15px; }'
        };
        let currentFile = 'index.html';

        function addLog(msg, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${time}] ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            Object.keys(files).forEach(name => {
                const item = document.createElement('div');
                item.className = `p-2 px-3 rounded-lg cursor-pointer text-xs flex items-center gap-3 transition-all ${name === currentFile ? 'bg-blue-600/10 text-blue-400 border border-blue-500/30' : 'text-gray-500 hover:bg-white/5'}`;
                item.innerHTML = `<i class="fas ${name.endsWith('.css') ? 'fa-palette' : 'fa-file-code'}"></i> ${name}`;
                item.onclick = () => switchFile(name);
                list.appendChild(item);
            });
        }

        function switchFile(name) {
            addLog(`Fájl váltás: ${name}`);
            files[currentFile] = document.getElementById('editorField').value;
            currentFile = name;
            document.getElementById('currentFileNameDisplay').innerText = name;
            document.getElementById('editorField').value = files[name];
            renderFileList();
        }

        function addNewFile() {
            const name = prompt("Fájlnév:");
            if (name && !files[name]) {
                files[name] = "";
                addLog(`Új fájl létrehozva: ${name}`, 'success');
                switchFile(name);
            }
        }

        async function deployProject() {
            const slug = document.getElementById('siteSlug').value.trim();
            const btn = document.getElementById('deployBtn');
            
            if(!slug) return addLog("HIBA: Adj meg projekt nevet!", "error");

            addLog(`Kapcsolódás a Supabase-hez... (URL: ${SUPABASE_URL})`);
            btn.disabled = true;
            files[currentFile] = document.getElementById('editorField').value;

            try {
                addLog(`Adatok küldése... (Slug: ${slug})`);
                const { data, error } = await supabaseClient.rpc('deploy_site', {
                    project_slug: slug,
                    project_files: files
                });

                if (error) throw error;

                addLog("SIKER: Adatbázis frissítve!", "success");
                const shareUrl = window.location.origin + window.location.pathname + '?s=' + slug;
                addLog(`LINK GENERÁLVA: ${shareUrl}`, "success");
                
                if(confirm("Sikeres mentés! Megnyitod?")) window.open(shareUrl, '_blank');

            } catch (err) {
                addLog(`KRITIKUS HIBA: ${err.message}`, "error");
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        async function loadSite() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('s');
            if (slug) {
                addLog(`Projekt betöltése: ${slug}...`);
                const { data, error } = await supabaseClient.from('sites').select('files').eq('slug', slug).single();
                
                if (data) {
                    addLog("Projekt betöltve, renderelés...", "success");
                    document.getElementById('app').classList.add('hidden');
                    const viewer = document.getElementById('viewer');
                    const iframe = document.getElementById('viewer-frame');
                    
                    let html = data.files['index.html'];
                    let css = "";
                    Object.keys(data.files).forEach(f => { if(f.endsWith('.css')) css += `<style>${data.files[f]}</style>`; });
                    
                    iframe.srcdoc = html.includes('</head>') ? html.replace('</head>', css + '</head>') : css + html;
                    viewer.classList.remove('hidden');
                } else {
                    addLog("HIBA: Ez a projekt nem található az adatbázisban.", "error");
                }
            }
        }

        document.getElementById('editorField').value = files['index.html'];
        renderFileList();
        loadSite();
    </script>
</body>
</html>
